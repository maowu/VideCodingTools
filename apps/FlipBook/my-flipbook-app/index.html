<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF 3D 擬真翻頁書</title>
    <script src="[https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js](https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js)"></script>
    <script src="[https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.min.js](https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.min.js)"></script>
    <script src="[https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js](https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js)"></script>
    <script src="[https://cdn.tailwindcss.com](https://cdn.tailwindcss.com)"></script>
    <style>
        body { background-color: #d1d5db; overflow: hidden; }
        #flipbook-container { display: none; justify-content: center; align-items: center; min-height: 100vh; perspective: 2000px; }
        .flip-book { box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6); background-color: transparent; }
        .page { background-color: white; overflow: hidden; backface-visibility: hidden; }
        .page-content { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; background-color: white; }
        img { max-width: 100%; max-height: 100%; display: block; image-rendering: -webkit-optimize-contrast; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3b82f6; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-300 font-sans">

    <nav class="bg-white shadow-md p-4 fixed top-0 w-full z-40 flex justify-between items-center">
        <h1 class="text-xl font-bold text-blue-600">電子翻頁書</h1>
        <div id="controls" class="hidden flex items-center space-x-4">
            <div class="flex bg-gray-100 rounded-lg p-1 items-center">
                <button id="prevBtn" class="p-2 hover:bg-white rounded-md transition">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                </button>
                <span id="pageInfo" class="px-4 text-sm font-bold text-gray-700">0 / 0</span>
                <button id="nextBtn" class="p-2 hover:bg-white rounded-md transition">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                </button>
            </div>
        </div>
    </nav>

    <div id="loading-section" class="fixed inset-0 bg-white z-50 flex flex-col items-center justify-center">
        <div class="loader mb-4"></div>
        <p id="loading-text" class="text-xl font-bold">載入書本中...</p>
    </div>

    <div id="flipbook-container">
        <div id="book" class="flip-book"></div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = '[https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js](https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js)';
        
        // --- 設定：在這裡指定你的 PDF 檔名 ---
        const TARGET_PDF = 'my_book.pdf'; 

        window.onload = async () => {
            const bookElement = document.getElementById('book');
            const loadingSection = document.getElementById('loading-section');
            const flipbookContainer = document.getElementById('flipbook-container');
            const loadingText = document.getElementById('loading-text');

            try {
                // 讀取本地 PDF 檔案
                const response = await fetch(TARGET_PDF);
                if(!response.ok) throw new Error("找不到 PDF 檔案");
                const arrayBuffer = await response.arrayBuffer();
                const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;
                const numPages = pdf.numPages;

                const firstPage = await pdf.getPage(1);
                const baseViewport = firstPage.getViewport({ scale: 1.0 });

                for (let i = 1; i <= numPages; i++) {
                    loadingText.innerText = `讀取頁面: ${i} / ${numPages}`;
                    const page = await pdf.getPage(i);
                    const viewport = page.getViewport({ scale: 2.5 });
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.height = viewport.height;
                    canvas.width = viewport.width;
                    ctx.fillStyle = "#ffffff";
                    ctx.fillRect(0, 0, canvas.width, canvas.height);

                    await page.render({ canvasContext: ctx, viewport: viewport }).promise;

                    // 繪製書脊陰影
                    const isLeftPage = (i > 1 && i % 2 === 0);
                    const isRightPage = (i === 1 || i % 2 !== 0);
                    const shadowWidth = canvas.width * 0.08;
                    let gradient;
                    if (isLeftPage) {
                        gradient = ctx.createLinearGradient(canvas.width - shadowWidth, 0, canvas.width, 0);
                        gradient.addColorStop(0, 'rgba(0,0,0,0)');
                        gradient.addColorStop(1, 'rgba(0,0,0,0.12)');
                        ctx.fillStyle = gradient;
                        ctx.fillRect(canvas.width - shadowWidth, 0, shadowWidth, canvas.height);
                    } else if (isRightPage && i > 1) {
                        gradient = ctx.createLinearGradient(0, 0, shadowWidth, 0);
                        gradient.addColorStop(0, 'rgba(0,0,0,0.12)');
                        gradient.addColorStop(1, 'rgba(0,0,0,0)');
                        ctx.fillStyle = gradient;
                        ctx.fillRect(0, 0, shadowWidth, canvas.height);
                    }

                    const pageDiv = document.createElement('div');
                    pageDiv.className = 'page';
                    pageDiv.innerHTML = `<div class="page-content"><img src="${canvas.toDataURL('image/jpeg', 0.9)}"></div>`;
                    bookElement.appendChild(pageDiv);
                }

                // 初始化翻頁
                const containerWidth = window.innerWidth * 0.95;
                const containerHeight = window.innerHeight * 0.8;
                const ratio = Math.min(containerWidth / (baseViewport.width * 2), containerHeight / baseViewport.height);
                
                const pageFlip = new St.PageFlip(bookElement, {
                    width: Math.floor(baseViewport.width * ratio),
                    height: Math.floor(baseViewport.height * ratio),
                    size: "stretch",
                    showCover: true,
                    useMouseEvents: true,
                    flippingTime: 800
                });

                pageFlip.loadFromHTML(document.querySelectorAll('.page'));
                loadingSection.classList.add('hidden');
                flipbookContainer.style.display = 'flex';
                document.getElementById('controls').classList.remove('hidden');

                // 綁定按鈕
                const updatePage = () => { document.getElementById('pageInfo').innerText = `${pageFlip.getCurrentPageIndex() + 1} / ${numPages}`; };
                pageFlip.on('flip', updatePage);
                document.getElementById('prevBtn').onclick = () => pageFlip.flipPrev();
                document.getElementById('nextBtn').onclick = () => pageFlip.flipNext();
                updatePage();

            } catch (err) {
                loadingText.innerText = "載入失敗: " + err.message;
            }
        };
    </script>
</body>
</html>
